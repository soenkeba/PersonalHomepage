name: Deploy Website to Strato

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build React App
        run: npm run build

      - name: Setup SSH and Deploy via SFTP
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync
          # Delete all old files first to ensure clean deployment
          echo "Deleting old files from server..."
          sshpass -e ssh -o StrictHostKeyChecking=no -p 22 ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_SERVER }} "
            rm -f index.html impressum.html about-us.html service-page.html pricing.html untitled.html keybase.txt 2>/dev/null || true;
            rm -rf assets/ bootstrap/ css/ fonts/ js/ 2>/dev/null || true;
            rm -f test-ftp.py test-ftp.sh test-sftp.sh 2>/dev/null || true;
            echo 'Old files deleted'
          "
          # Deploy new React app from dist folder
          echo "Deploying new React app..."
          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p 22" \
            ./dist/ ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_SERVER }}:~/
          echo "Deployment completed"
