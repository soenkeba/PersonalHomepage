name: Deploy Website to Strato

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build React App
        run: npm run build

      - name: Setup SSH and Deploy via SFTP
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync
          # Deploy dist folder to Strato web root (Home directory is the web root)
          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p 22" \
            ./dist/ ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_SERVER }}:~/
