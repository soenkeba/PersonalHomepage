name: Deploy Website to Strato

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup SSH and Deploy via SFTP
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync
          # Deploy to Strato web root directory (default: /html/)
          # You can set SFTP_TARGET_DIR secret to override (e.g., /www/, /htdocs/)
          TARGET_DIR="${{ secrets.SFTP_TARGET_DIR || '/html/' }}"
          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p 22" \
            ./ ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_SERVER }}:$TARGET_DIR
